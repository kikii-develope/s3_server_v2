services:
  s3-server:
    profiles:
      - onprem-disabled
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.onprem
    environment:
      - REDIS_DB=1
    ports:
      - "8989:8989"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    depends_on:
      - redis

  redis:
    profiles:
      - onprem-disabled
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
